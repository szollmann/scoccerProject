<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebXR Hit Test AR Cube</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.156.0/examples/jsm/webxr/ARButton.js';

// Scene, Camera, Renderer
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

// Cube to place
const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
const material = new THREE.MeshNormalMaterial();
const cube = new THREE.Mesh(geometry, material);
cube.visible = false; // start hidden
scene.add(cube);

// Reference space and hit-test source
let hitTestSource = null;
let localSpace = null;

renderer.xr.addEventListener('sessionstart', async () => {
    const session = renderer.xr.getSession();
    localSpace = await session.requestReferenceSpace('local');
    hitTestSource = await session.requestHitTestSource({ space: localSpace });
});

renderer.xr.addEventListener('sessionend', () => {
    hitTestSource = null;
    localSpace = null;
    cube.visible = false;
});

// Animation / render loop
renderer.setAnimationLoop((time, frame) => {
    if (frame && hitTestSource) {
        const referenceSpace = localSpace;
        const hitTestResults = frame.getHitTestResults(hitTestSource);

        if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(referenceSpace);
            cube.visible = true;
            cube.position.set(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
            cube.quaternion.set(pose.transform.orientation.x, pose.transform.orientation.y, pose.transform.orientation.z, pose.transform.orientation.w);
        }
    }

    renderer.render(scene, camera);
});

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
